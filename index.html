<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기억의 조각</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap');
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            --mem-modal-bg-grad-start: rgb(220, 228, 235);
            --mem-modal-bg-grad-end: rgb(245, 245, 245);
            --mem-modal-inner-bg: rgb(255, 255, 255);
            --mem-icon-bg: rgb(220, 228, 235);
            --mem-modal-text: #333333;
            --mem-modal-subtext: #555555;
            --mem-border-color: rgba(208, 208, 208, 0.8);
            --bg-color: #f0f4f8;
            --canvas-bg: #f4f5f6;
        }

        body { font-family: 'Gowun Dodum', sans-serif; background-color: var(--bg-color); color: var(--mem-modal-text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; user-select: none; }
        .main-layout { display: flex; flex-wrap: wrap; gap: 20px; max-width: 1100px; width: 100%; align-items: flex-start; justify-content: center; }
        .result-area { flex: 2; min-width: 340px; background: #ffffff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid var(--mem-border-color); display: flex; flex-direction: column; align-items: center; overflow: hidden; box-sizing: border-box; position: sticky; top: 20px; z-index: 10; }
        .result-header { width: 100%; display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; margin-bottom: 10px; border-bottom: 2px solid var(--mem-border-color); }
        .result-header h3 { margin: 0; font-size: 1.2rem; font-weight: 700; }
        .preview-container { width: 100%; height: 470px; display: grid; place-items: center; overflow: hidden; padding: 10px 0; box-sizing: border-box; }
        #scaleWrapper { position: relative; width: 600px; height: 450px; }
        .controls-area { flex: 1; min-width: 320px; z-index: 5; }
        .maker-container { background: #ffffff; border: 1px solid var(--mem-border-color); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); box-sizing: border-box; }
        .maker-title { font-size: 1.3rem; font-weight: 700; margin-top: 0; margin-bottom: 20px; text-align: center; }
        .mode-toggle { display: flex; gap: 10px; margin-bottom: 25px; justify-content: center; }
        .mode-toggle input[type="radio"] { display: none; }
        .mode-toggle label { padding: 8px 16px; border: 1px solid var(--mem-border-color); border-radius: 20px; cursor: pointer; transition: all 0.2s; font-size: 0.95rem; font-weight: 600; color: var(--mem-modal-subtext); background: #fff; }
        .mode-toggle input[type="radio"]:checked + label { background-color: var(--mem-modal-text); color: #fff; border-color: var(--mem-modal-text); }
        .section-title { font-size: 1.05rem; font-weight: 700; color: var(--mem-modal-text); margin: 25px 0 15px 0; padding-bottom: 8px; border-bottom: 2px dashed #eee; }
        .input-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        .input-group label { font-size: 0.95rem; font-weight: 700; margin-bottom: 5px; color: var(--mem-modal-subtext); }
        .input-group input[type="text"], .input-group textarea { padding: 10px; border: 1px solid var(--mem-border-color); background: var(--bg-color); color: var(--mem-modal-text); font-family: 'Gowun Dodum', sans-serif; border-radius: 6px; outline: none; font-size: 0.95rem; }
        .input-group textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
        .file-input-wrapper { display: flex; align-items: center; gap: 10px; width: 100%; }
        .file-input-wrapper input[type="file"] { flex: 1; min-width: 0; font-family: 'Gowun Dodum', sans-serif; font-size: 0.85rem; }
        .clear-btn { flex-shrink: 0; background: #e2e8f0; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-family: 'Gowun Dodum', sans-serif; font-size: 0.8rem; }
        .clear-btn:hover { background: #cbd5e0; }
        #bgOpacityPanel { display: none; background: #f9f9f9; padding: 12px; border-radius: 8px; border: 1px solid #eee; margin-top: 10px; gap: 10px; flex-direction: column; }
        .slider-row { display: flex; align-items: center; gap: 10px; }
        .slider-row label { font-size: 0.8rem; width: 70px; margin: 0; }
        .slider-row input[type="range"] { flex: 1; cursor: pointer; }
        .capture-wrapper { width: 600px; height: 450px; background-color: var(--canvas-bg); display: flex; justify-content: center; align-items: center; position: absolute; top: 0; left: 0; box-sizing: border-box; overflow: hidden; border-radius: 4px; transform-origin: top left; }
        #bgLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; display: none; background-size: cover; background-position: 50% 50%; background-repeat: no-repeat; opacity: 1; pointer-events: none; }
        #bgImg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 1; pointer-events: none; }
        .canvas-credit { position: absolute; bottom: 14px; right: 16px; z-index: 2; text-align: right; color: #ffffff; font-family: 'Pretendard', sans-serif; font-size: 0.8rem; line-height: 1.4; opacity: 0.85; pointer-events: none; text-shadow: 0 1px 3px rgba(0,0,0,0.4), 0 0 2px rgba(0,0,0,0.3); }
        .commission-credit { font-size: 0.75rem; }
        
        #cardsContainer { display: flex; gap: 30px; justify-content: center; align-items: stretch; z-index: 1; width: 100%; }
        .card-container { position: relative; width: 210px; min-height: 310px; }
        
        .hard-shadow-layer {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.2);
        }
        
        .mem-card { background: linear-gradient(to bottom, var(--mem-modal-bg-grad-start) 0%, var(--mem-modal-bg-grad-end) 100%); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); width: 210px; min-height: 310px; position: relative; z-index: 1; display: flex; flex-direction: column; padding: 38px 10px 10px 10px; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        
        .mem-card-header { position: absolute; top: 0; left: 0; width: 100%; height: 38px; display: flex; align-items: center; justify-content: flex-start; padding-left: 12px; box-sizing: border-box; }
        .mem-card-title { color: var(--mem-modal-text); font-size: 0.95rem; font-weight: 500; letter-spacing: -0.8px; transform: scaleX(0.95); transform-origin: left center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 90%; }
        .mem-card-inner { background-color: var(--mem-modal-inner-bg); flex: 1; display: flex; flex-direction: column; align-items: center; padding: 15px; }
        .mem-icon-box { width: 55px; height: 55px; background-color: var(--mem-icon-bg); display: flex; justify-content: center; align-items: center; margin-bottom: 15px; }
        .mem-card-icon { font-size: 2.3rem; filter: drop-shadow(0 3px 6px rgba(0,0,0,0.15)); font-family: 'Noto Color Emoji', sans-serif; line-height: 1; }
        .mem-card-desc { font-size: 0.85rem; color: var(--mem-modal-text); line-height: 1.6; font-weight: 400; letter-spacing: -0.8px; transform: scaleX(0.95); word-break: keep-all; transform-origin: top center; text-align: center; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; }
        .mem-counter-box { margin-top: auto; background-color: var(--mem-icon-bg); color: var(--mem-modal-subtext); padding: 4px 12px; font-size: 0.8rem; font-weight: 400; letter-spacing: -0.5px; transform: scaleX(0.95); }
        
        .download-btn { padding: 8px 16px; background-color: #888888; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-family: 'Gowun Dodum', sans-serif; transition: background-color 0.2s; }
        .download-btn:hover { background-color: #666666; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 640px; text-align: center; }
        #cropCanvas { border: 2px solid #ccc; cursor: move; touch-action: none; background: #eee; }
        .modal-btns { margin-top: 15px; display: flex; gap: 10px; justify-content: center; }
        @media (max-width: 768px) {
            body { padding: 10px; }
            .result-area { position: sticky; top: 0; padding: 10px; border-radius: 0 0 12px 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); margin: -10px -10px 10px -10px; width: calc(100% + 20px); }
            .preview-container { height: auto; min-height: 240px; }
            .controls-area { width: 100%; margin-top: 5px; }
        }
    </style>
</head>
<body>

    <div class="modal-overlay" id="cropModal">
        <div class="modal-content">
            <h3>영역을 드래그해 옮기고 휠로 확대하세요</h3>
            <canvas id="cropCanvas" width="600" height="450"></canvas>
            <div class="modal-btns">
                <button class="download-btn" onclick="applyCrop()">적용</button>
                <button class="clear-btn" onclick="closeModal()">취소</button>
            </div>
        </div>
    </div>

    <div class="main-layout">
        <div class="result-area">
            <div class="result-header">
                <h3>미리보기</h3>
                <button class="download-btn" onclick="saveAsImage()">이미지 저장</button>
            </div>
            <div class="preview-container" id="previewContainer">
                <div id="scaleWrapper">
                    <div class="capture-wrapper" id="captureTarget">
                        <div id="bgLayer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; display: none; overflow: hidden;">
                             <img id="bgImg" style="width: 100%; height: 100%; object-fit: cover;">
                        </div>
                        <div class="canvas-credit">
                            <div>@229x812</div>
                            <div id="previewCommission" class="commission-credit"></div>
                        </div>
                        <div id="cardsContainer">
                            <div class="card-container" id="cardWrapper1">
                                <div class="hard-shadow-layer"></div>
                                <div class="mem-card" id="card1">
                                    <div class="mem-card-header"><span class="mem-card-title" id="previewTitle1">◇ 작은 해파리 모빌</span></div>
                                    <div class="mem-card-inner">
                                        <div class="mem-icon-box"><span class="mem-card-icon" id="previewIcon1">🪼</span></div>
                                        <div class="mem-card-desc" id="previewDesc1">해파리 모양의 유리 장식품. 집무실에는 영 어울리지 않는다며 핀잔을 주었지만, 바람에 흔들리는 모습을 볼 때마다 미소를 짓곤 한다.</div>
                                        <div class="mem-counter-box" id="previewIndex1">???의 기억</div>
                                    </div>
                                </div>
                            </div>
                            <div class="card-container" id="cardWrapper2" style="display: none;">
                                <div class="hard-shadow-layer"></div>
                                <div class="mem-card" id="card2">
                                    <div class="mem-card-header"><span class="mem-card-title" id="previewTitle2">◇ 책상 위의 화분</span></div>
                                    <div class="mem-card-inner">
                                        <div class="mem-icon-box"><span class="mem-card-icon" id="previewIcon2">🪴</span></div>
                                        <div class="mem-card-desc" id="previewDesc2">삭막한 집무실에 생기를 불어넣겠다며 들고 온 식물. 햇빛이 잘 드는 창가에 놓인 채, 두 사람의 애정 어린 눈길을 받으며 무럭무럭 자라고 있다.</div>
                                        <div class="mem-counter-box" id="previewIndex2">???의 기억</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls-area">
            <div class="maker-container">
                <h2 class="maker-title">기억의 조각 만들기</h2>
                <form id="itemForm" onsubmit="event.preventDefault();">
                    <div class="mode-toggle">
                        <input type="radio" id="mode1" name="personMode" value="1" checked>
                        <label for="mode1">1인</label>
                        <input type="radio" id="mode2" name="personMode" value="2">
                        <label for="mode2">2인</label>
                    </div>
                    <div class="input-group">
                        <label for="bgImageInput">배경 이미지 설정</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="bgImageInput" accept="image/*">
                            <button type="button" class="clear-btn" onclick="removeBgImage()">지우기</button>
                        </div>
                        <div id="bgOpacityPanel">
                            <div class="slider-row"><label>투명도</label><input type="range" id="bgOpacity" min="0" max="1" step="0.01" value="1"></div>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="commissionInput">배경 이미지 출처</label>
                        <input type="text" id="commissionInput" placeholder="예: Commission by. 000">
                    </div>
                    <div id="person1Controls">
                        <div class="section-title">첫 번째 기억</div>
                        <div class="input-group">
                            <label for="itemEmoji1">아이템 이모지</label>
                            <input type="text" id="itemEmoji1" value="🪼">
                        </div>
                        <div class="input-group">
                            <label for="itemName1">아이템 이름</label>
                            <input type="text" id="itemName1" value="작은 해파리 모빌">
                        </div>
                        <div class="input-group">
                            <label for="itemDesc1">아이템 설명</label>
                            <textarea id="itemDesc1">해파리 모양의 유리 장식품. 집무실에는 영 어울리지 않는다며 핀잔을 주었지만, 바람에 흔들리는 모습을 볼 때마다 미소를 짓곤 한다.</textarea>
                        </div>
                        <div class="input-group">
                            <label for="itemIndex1">누구의 기억인가요?</label>
                            <input type="text" id="itemIndex1" value="">
                        </div>
                    </div>
                    <div id="person2Controls" style="display: none;">
                        <div class="section-title">두 번째 기억</div>
                        <div class="input-group">
                            <label for="itemEmoji2">아이템 이모지</label>
                            <input type="text" id="itemEmoji2" value="🪴">
                        </div>
                        <div class="input-group">
                            <label for="itemName2">아이템 이름</label>
                            <input type="text" id="itemName2" value="책상 위의 화분">
                        </div>
                        <div class="input-group">
                            <label for="itemDesc2">아이템 설명</label>
                            <textarea id="itemDesc2">삭막한 집무실에 생기를 불어넣겠다며 들고 온 식물. 햇빛이 잘 드는 창가에 놓인 채, 두 사람의 애정 어린 눈길을 받으며 무럭무럭 자라고 있다.</textarea>
                        </div>
                        <div class="input-group">
                            <label for="itemIndex2">누구의 기억인가요?</label>
                            <input type="text" id="itemIndex2" value="">
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

<script>
    let rawImage = null;
    let cropX = 0, cropY = 0;
    let imgScale = 1; 
    const canvas = document.getElementById('cropCanvas');
    const ctx = canvas.getContext('2d');

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('bgOpacity').addEventListener('input', (e) => {
            document.getElementById('bgImg').style.opacity = e.target.value;
        });

        document.getElementById('bgImageInput').addEventListener('click', function() { this.value = ''; });
        document.getElementById('bgImageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    rawImage = img;
                    const minScale = Math.max(600 / rawImage.width, 450 / rawImage.height);
                    imgScale = minScale;
                    cropX = (600 - rawImage.width * imgScale) / 2;
                    cropY = (450 - rawImage.height * imgScale) / 2;
                    
                    document.getElementById('cropModal').style.display = 'flex';
                    drawCropView();
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        });

        let isDragging = false;
        let startX, startY;
        canvas.addEventListener('mousedown', e => { isDragging = true; startX = e.offsetX - cropX; startY = e.offsetY - cropY; });
        canvas.addEventListener('mousemove', e => {
            if (!isDragging) return;
            cropX = e.offsetX - startX;
            cropY = e.offsetY - startY;
            applyBoundaries();
            drawCropView();
        });
        canvas.addEventListener('mouseup', () => isDragging = false);

        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            const zoomFactor = 0.0005; 
            const delta = -e.deltaY;
            const newScale = imgScale * (1 + delta * zoomFactor);
            const minScale = Math.max(600 / rawImage.width, 450 / rawImage.height);
            imgScale = Math.max(minScale, Math.min(newScale, 5.0));
            applyBoundaries();
            drawCropView();
        }, {passive: false});

        document.querySelectorAll('input[name="personMode"]').forEach(radio => {
            radio.addEventListener('change', function() {
                const isTwo = this.value === '2';
                document.getElementById('cardWrapper2').style.display = isTwo ? 'block' : 'none';
                document.getElementById('person2Controls').style.display = isTwo ? 'block' : 'none';
            });
        });
        ['commissionInput', 'itemEmoji1', 'itemName1', 'itemDesc1', 'itemIndex1', 'itemEmoji2', 'itemName2', 'itemDesc2', 'itemIndex2'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('input', updatePreviewText);
        });
    });

    function applyBoundaries() {
        const w = rawImage.width * imgScale;
        const h = rawImage.height * imgScale;
        if (cropX > 0) cropX = 0;
        if (cropX < 600 - w) cropX = 600 - w;
        if (cropY > 0) cropY = 0;
        if (cropY < 450 - h) cropY = 450 - h;
    }

    function drawCropView() {
        if (!rawImage) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const w = rawImage.width * imgScale;
        const h = rawImage.height * imgScale;
        ctx.drawImage(rawImage, cropX, cropY, w, h);
    }

    function applyCrop() {
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = 600;
        tempCanvas.height = 450;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.drawImage(rawImage, cropX, cropY, rawImage.width * imgScale, rawImage.height * imgScale);
        
        const bgImg = document.getElementById('bgImg');
        bgImg.src = tempCanvas.toDataURL('image/png');
        document.getElementById('bgLayer').style.display = 'block';
        document.getElementById('bgOpacityPanel').style.display = 'flex';
        closeModal();
    }

    function closeModal() { document.getElementById('cropModal').style.display = 'none'; }

    function removeBgImage() {
        document.getElementById('bgLayer').style.display = 'none';
        document.getElementById('bgImg').src = '';
        document.getElementById('bgOpacityPanel').style.display = 'none';
    }

    function saveAsImage() {
        const target = document.getElementById('captureTarget');
        html2canvas(target, { 
            backgroundColor: '#f4f5f6', 
            scale: 2, 
            useCORS: true
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = "기억의_조각.png";
            link.href = canvas.toDataURL('image/png'); 
            link.click();
        });
    }

    function resizePreview() {
        const container = document.getElementById('previewContainer');
        const scaleWrapper = document.getElementById('scaleWrapper');
        const scale = Math.min(1, container.clientWidth / 600);
        scaleWrapper.style.transform = `scale(${scale})`;
        container.style.height = `${450 * scale}px`;
    }

    function updatePreviewText() {
        ['1', '2'].forEach(num => {
            const title = document.getElementById(`itemName${num}`).value;
            const targetTitle = document.getElementById(`previewTitle${num}`);
            if (targetTitle) targetTitle.innerText = title.startsWith('◇') ? title : `◇ ${title}`;
            const icon = document.getElementById(`previewIcon${num}`);
            if (icon) icon.innerText = document.getElementById(`itemEmoji${num}`).value;
            const desc = document.getElementById(`previewDesc${num}`);
            if (desc) desc.innerHTML = document.getElementById(`itemDesc${num}`).value.replace(/\n/g, '<br>');
            const index = document.getElementById(`previewIndex${num}`);
            if (index) index.innerText = document.getElementById(`itemIndex${num}`).value ? `${document.getElementById(`itemIndex${num}`).value}의 기억` : "???의 기억";
        });
        document.getElementById('previewCommission').innerText = document.getElementById('commissionInput').value;
    }

    window.addEventListener('resize', resizePreview);
    window.addEventListener('load', resizePreview);
</script>
</body>
</html>
